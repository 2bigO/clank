model:
  default: gemma-hermes
  provider: custom
  base_url: http://gemma-hermes:8080/v1
  api_key: dummy
  context_length: 131072

terminal:
  cwd: /workspace

streaming:
  enabled: true
  edit_interval: 0.5
  buffer_threshold: 40
  cursor: " ▎"

huggingface:
  token: ${HF_TOKEN}
  model_root: ${MODEL_ROOT}

stt:
  provider: openai
  openai:
    model: whisper-1
    base_url: http://stt:8080/v1
    api_key: dummy

telegram:
  require_mention: true

skills:
  external_dirs:
    - /workspace/host/Hermes/skills

custom_providers:
  - name: Local Gemma E4B
    base_url: http://gemma-hermes:8080/v1
    api_key: dummy
    model: gemma-hermes
    models:
      gemma-hermes:
        context_length: 131072
