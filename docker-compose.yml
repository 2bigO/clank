services:
  beads:
    build:
      context: .
      dockerfile: Beads/Dockerfile
    image: beads-local:latest
    container_name: beads
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    environment:
      - BEADS_DOLT_SHARED_SERVER=1
      - BEADS_DOLT_SERVER_HOST=127.0.0.1
      - BEADS_DOLT_SERVER_PORT=3308
      - BEADS_DIR=/workspace/.beads
    volumes:
      - .:/workspace
      - ./Beads/state:/var/lib/beads
    working_dir: /workspace

  stt:
    build:
      context: .
      dockerfile: STT/Dockerfile
    image: whisper-stt-local:latest
    container_name: stt
    ports:
      - "127.0.0.1:${STT_PORT:-8170}:8080"
    volumes:
      - ${MODEL_ROOT:?set MODEL_ROOT in .env}:/models:ro
    command:
      - --model
      - ${STT_MODEL_PATH:-/models/oxide-lab/whisper-large-v3-GGUF/whisper.cpp/whisper-large-v3-q8_0.gguf}
      - --host
      - 0.0.0.0
      - --port
      - "8080"
      - --request-path
      - /v1
      - --inference-path
      - /audio/transcriptions
      - --convert
      - --language
      - auto
      - --threads
      - "16"
      - --processors
      - "1"

  qwopus-pi:
    build:
      context: .
      dockerfile: TurboQuant/Dockerfile
    image: turboquant-rocm:latest
    container_name: qwopus-pi
    devices:
      - /dev/dri
      - /dev/kfd
    group_add:
      - video
      - render
    security_opt:
      - seccomp=unconfined
    ports:
      - "${QWOPUS_PORT:-8080}:8080"
    volumes:
      - ${MODEL_ROOT:?set MODEL_ROOT in .env}:/models:ro
    command:
      - llama-server
      - --model
      - ${QWOPUS_MODEL_PATH:-/models/Jackrong/Qwopus3.5-27B-v3-GGUF/Qwopus3.5-27B-v3-Q6_K.gguf}
      - --alias
      - qwopus-pi
      - --gpu-layers
      - "999"
      - --flash-attn
      - "on"
      - --cache-type-k
      - q8_0
      - --cache-type-v
      - turbo4
      - --ctx-size
      - "262144"
      - --parallel
      - "1"
      - --host
      - 0.0.0.0
      - --port
      - "8080"

  gemma-hermes:
    build:
      context: .
      dockerfile: TurboQuant/Dockerfile
    image: turboquant-rocm:latest
    container_name: gemma-hermes
    devices:
      - /dev/dri
      - /dev/kfd
    group_add:
      - video
      - render
    security_opt:
      - seccomp=unconfined
    ports:
      - "${GEMMA_PORT:-8081}:8080"
    volumes:
      - ${MODEL_ROOT:?set MODEL_ROOT in .env}:/models:ro
    command:
      - llama-server
      - --model
      - ${GEMMA_MODEL_PATH:-/models/Jackrong/Gemopus-4-E4B-it-GGUF/gemma-4-E4B-it.Q8_0.gguf}
      - --mmproj
      - ${GEMMA_MMPROJ_PATH:-/models/unsloth/gemma-4-E4B-it-GGUF/mmproj-BF16.gguf}
      - --alias
      - gemma-hermes
      - --gpu-layers
      - "999"
      - --flash-attn
      - "on"
      - --cache-type-k
      - q8_0
      - --cache-type-v
      - turbo4
      - --ctx-size
      - "131072"
      - --parallel
      - "1"
      - --host
      - 0.0.0.0
      - --port
      - "8080"

  pi:
    build:
      context: .
      dockerfile: Pi/Dockerfile
    image: pi-local:latest
    container_name: pi
    depends_on:
      - beads
      - qwopus-pi
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    stdin_open: true
    tty: true
    environment:
      - HOME=/workspace
      - BEADS_DOLT_SHARED_SERVER=1
      - BEADS_DOLT_SERVER_HOST=beads
      - BEADS_DOLT_SERVER_PORT=3308
      - BEADS_DIR=/workspace/.beads
    volumes:
      - .:/workspace
    working_dir: /workspace
    command:
      - sleep
      - infinity

  hermes:
    build:
      context: .
      dockerfile: Hermes/Dockerfile
    image: hermes-local:latest
    container_name: hermes
    depends_on:
      - beads
      - gemma-hermes
      - stt
    stdin_open: true
    tty: true
    env_file:
      - ./Hermes/.env
    environment:
      - BEADS_DOLT_SHARED_SERVER=1
      - BEADS_DOLT_SERVER_HOST=beads
      - BEADS_DOLT_SERVER_PORT=3308
      - BEADS_DIR=/workspace/host/.beads
    volumes:
      - ./Hermes/config.yaml:/etc/hermes-bootstrap/config.yaml:ro
      - hermes-home:/root/.hermes
      - ./Hermes/workspace:/workspace
      - .:/workspace/host
      - ${MODEL_ROOT:?set MODEL_ROOT in .env}:/models
      - ${DOCKER_BIN:-/usr/bin/docker}:/usr/local/bin/docker:ro
      - /var/run/docker.sock:/var/run/docker.sock
    working_dir: /workspace
    command:
      - sleep
      - infinity

  hermes-api:
    image: hermes-local:latest
    container_name: hermes-api
    depends_on:
      - beads
      - gemma-hermes
      - stt
    env_file:
      - ./Hermes/.env
    environment:
      - BEADS_DOLT_SHARED_SERVER=1
      - BEADS_DOLT_SERVER_HOST=beads
      - BEADS_DOLT_SERVER_PORT=3308
      - BEADS_DIR=/workspace/host/.beads
      - HOST_UID=${HOST_UID:-1000}
      - HOST_GID=${HOST_GID:-1000}
    ports:
      - "127.0.0.1:${HERMES_API_PORT:-8642}:8642"
    volumes:
      - ./Hermes/config.yaml:/etc/hermes-bootstrap/config.yaml:ro
      - hermes-home:/root/.hermes
      - ./Hermes/workspace:/workspace
      - .:/workspace/host
      - ${MODEL_ROOT:?set MODEL_ROOT in .env}:/models
      - ${DOCKER_BIN:-/usr/bin/docker}:/usr/local/bin/docker:ro
      - /var/run/docker.sock:/var/run/docker.sock
    working_dir: /workspace
    command:
      - hermes
      - gateway

volumes:
  hermes-home:
